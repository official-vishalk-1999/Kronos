spring.application.name=kronos

spring.datasource.url=jdbc:mysql://localhost:3306/kronos_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Your_DB_Password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=kronosSecretKey2024SuperLongSecretKeyForJWTTokenSigningKronosAIScheduler
jwt.expiration=86400000

openai.api.key=YOUR_API_KEY
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini

server.port=8080

logging.level.com.kronos=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG