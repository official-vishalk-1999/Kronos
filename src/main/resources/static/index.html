<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kronos — AI Daily Scheduler</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0E0C1A;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    nav {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #7C6FFF;
    }
    .btn-signin {
      background: #7C6FFF;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-signin:hover { background: #5A4FD4; }

    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .center h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      letter-spacing: -1.5px;
      margin-bottom: 18px;
      line-height: 1.1;
    }
    .center h1 span { color: #7C6FFF; }
    .center p {
      font-size: clamp(15px, 2vw, 18px);
      color: #A09DC0;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .btn-start {
      background: #7C6FFF;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 36px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-start:hover { background: #5A4FD4; }
  </style>
</head>
<body>

<nav>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 36 36">
      <defs>
        <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7C6FFF"/>
          <stop offset="100%" stop-color="#FF6B8A"/>
        </linearGradient>
      </defs>
      <circle cx="18" cy="18" r="17" fill="url(#lg)"/>
      <circle cx="18" cy="18" r="2" fill="white"/>
      <line x1="18" y1="16" x2="18" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="18" y1="18" x2="23" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    Kronos
  </div>
  <button class="btn-signin" onclick="window.location.href='/login.html'">Sign In</button>
</nav>

<div class="center">
  <h1>Your AI-powered<br><span>daily scheduler</span></h1>
  <p>Tell Kronos your goals for the day. It builds a structured schedule for you — and adjusts it as you chat.</p>
  <button class="btn-start" onclick="window.location.href='/choose.html'">Get Started</button>
</div>

</body>
</html>
